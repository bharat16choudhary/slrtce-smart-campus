<header class="site-header">
  <div class="header-inner">

    <!-- Brand -->
    <div class="header-brand">
      <img src="https://slrtce.in/images/slrtce%20logo.png"
           onerror="this.src='https://ui-avatars.com/api/?name=S&background=E8B84B&color=4A4A4A&size=40&bold=true'"
           alt="SLRTCE">
      <span>SLRTCE</span>
    </div>

    <!-- Navigation -->
    <nav class="header-nav">
      <a href="{{ url_for('teacher_dashboard') }}" class="nav-item {% if tnav == 'dash' %}active{% endif %}">
        <i class="fa-solid fa-house"></i><span>Dashboard</span>
      </a>
      <a href="{{ url_for('teacher_assignments') }}" class="nav-item {% if tnav == 'assign' %}active{% endif %}">
        <i class="fa-solid fa-clipboard-list"></i><span>Assignments</span>
      </a>
      <a href="{{ url_for('teacher_study_material') }}" class="nav-item {% if tnav == 'study' %}active{% endif %}">
        <i class="fa-solid fa-book-open"></i><span>Study Material</span>
      </a>
      <a href="{{ url_for('student_calendar') }}" class="nav-item {% if tnav == 'cal' %}active{% endif %}">
        <i class="fa-solid fa-calendar-days"></i><span>Calendar</span>
      </a>
      <a href="{{ url_for('teacher_send_notice') }}" class="nav-item {% if tnav == 'notice' %}active{% endif %}">
        <i class="fa-solid fa-bullhorn"></i><span>Notice Board</span>
      </a>
      <a href="#" class="nav-item">
        <i class="fa-solid fa-headset"></i><span>Support</span>
      </a>
    </nav>

    <!-- Profile at bottom -->
    <div class="header-profile">
      <div class="profile-dropdown" id="profileDropdown">
        <div class="profile-dropdown-header">
          <div class="pd-name">{{ teacher.name }}</div>
          <div class="pd-role">{{ teacher.designation }} | {{ teacher.branch }}</div>
        </div>
        <a href="#"><i class="fa-solid fa-id-card"></i> Personal Details</a>
        <a href="#"><i class="fa-solid fa-key"></i> Change Password</a>
        <div class="pd-divider"></div>
        <a href="{{ url_for('logout') }}" class="pd-logout"><i class="fa-solid fa-right-from-bracket"></i> Log Out</a>
      </div>
      <div class="profile-btn" id="profileBtn" onclick="toggleProfile()">
        <img src="{{ teacher.photo }}" alt="{{ teacher.name }}">
        <div>
          <div class="profile-btn-name">{{ teacher.name }}</div>
          <div class="profile-btn-role">{{ teacher.designation }}</div>
        </div>
        <i class="fa-solid fa-chevron-up profile-btn-chevron"></i>
      </div>
    </div>

  </div>
</header>
